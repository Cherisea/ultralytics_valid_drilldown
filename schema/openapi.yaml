openapi: "3.1.0"

info:
  title: Ultralytics Validation API
  version: "1.0.0"
  description: |
    API contract for the Ultralytics Platform validation prototype.

    THIS FILE IS THE SINGLE SOURCE OF TRUTH for the frontend & backend ↔ API contract.
    Do not edit the generated files directly — run `npm run generate` instead:
      types/api.ts       - generated by openapi-typescript
      backend/models.py  - generated by datamodel-code-generator

# ---------------------------------------------------------------------------
# Endpoints
# ---------------------------------------------------------------------------

paths:

  /api/runs/{id}/summary:
    get:
      operationId: getRunSummary
      summary: Get a full validation run summary
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunSummaryResponse"

  /api/runs/{id}/images:
    get:
      operationId: listImages
      summary: List image results for a run with filtering and pagination
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: class
          in: query
          schema:
            type: string
          description: Filter by class name
        - name: errorType
          in: query
          schema:
            $ref: "#/components/schemas/ErrorType"
          description: Filter by error type
        - name: dominantErrorType
          in: query
          schema:
            $ref: "#/components/schemas/ErrorType"
          description: >
            Strict filter - only images whose domiant error matches.
            Distinct from errorType which checks for presence of an error.
        - name: confMin
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
          description: Minimum confidence threshold
        - name: confMax
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
          description: Maximum confidence threshold
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/SortOrder"
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageListResponse"

  /api/images/{id}:
    get:
      operationId: getImageDetail
      summary: Get the full detail of a single image result
      parameters:
        - $ref: "#/components/parameters/ImageId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageDetailResponse"

  /api/runs/{id}/patterns:
    get:
      operationId: getPatterns
      summary: Get error pattern groups for a run
      parameters:
        - $ref: "#/components/parameters/RunId"
        - name: groupBy
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/PatternGroupBy"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatternsResponse"

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------

components:

  parameters:

    RunId:
      name: id
      in: path
      required: true
      description: Validation run ID
      schema:
        type: string

    ImageId:
      name: id
      in: path
      required: true
      description: Image result ID
      schema:
        type: string

  schemas:

    # -------------------------------------------------------------------------
    # Enums
    # -------------------------------------------------------------------------

    ErrorType:
      type: string
      description: |
        The five failure modes a YOLO model can produce, from most to least severe:
          false_positive  – Predicted box with no matching GT (hallucinated object)
          false_negative  – GT with no matching prediction (missed object)
          localization    – Right class, IoU < 0.5 (detected but poorly framed)
          classification  – Right location, wrong class (confused label)
      enum:
        - false_positive
        - false_negative
        - localization
        - classification

    RunStatus:
      type: string
      enum:
        - complete
        - running
        - failed

    DataSplit:
      type: string
      enum:
        - val
        - test

    PatternGroupBy:
      type: string
      enum:
        - class
        - errorType
        - confidence

    SortOrder:
      type: string
      enum:
        - worst
        - best
        - most_errors

    # -------------------------------------------------------------------------
    # Geometry
    # -------------------------------------------------------------------------

    BBox:
      type: object
      description: Normalised bounding box in YOLO [cx, cy, w, h] format.
      required: [x, y, w, h]
      properties:
        x:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Centre-x, normalised
        y:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Centre-y, normalised
        w:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Width, normalised
        h:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: Height, normalised

    # -------------------------------------------------------------------------
    # Detection (model prediction)
    # -------------------------------------------------------------------------

    Detection:
      type: object
      required:
        - id
        - classId
        - className
        - confidence
        - bbox
        - matched
        - iou
        - errorType
        - groundTruthId
      properties:
        id:
          type: string
        classId:
          type: integer
        className:
          type: string
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
        bbox:
          $ref: "#/components/schemas/BBox"
        matched:
          type: boolean
          description: "true if IoU >= 0.5 with a GT of the same class"
        iou:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: IoU with the best-matching GT; 0 if no match
        errorType:
          description: null for true positives
          oneOf:
            - $ref: "#/components/schemas/ErrorType"
            - type: "null"
        groundTruthId:
          type: ["string", "null"]
          description: Link back to the GT this prediction corresponds to

    # -------------------------------------------------------------------------
    # GroundTruth annotation
    # -------------------------------------------------------------------------

    GroundTruth:
      type: object
      # DISCREPANCY RESOLVED: errorType is intentionally restricted to a subset
      # of ErrorType. A GT can only produce false_negative, localization, or
      # classification errors — never false_positive or duplicate.
      # models.py incorrectly uses the full ErrorType enum here; this YAML
      # definition is authoritative. Regenerate models.py to fix it.
      required:
        - id
        - classId
        - className
        - bbox
        - matched
        - matchedPredictionId
        - nearestPredictionId
        - nearestPredictionIou
        - errorType
      properties:
        id:
          type: string
        classId:
          type: integer
        className:
          type: string
        bbox:
          $ref: "#/components/schemas/BBox"
        matched:
          type: boolean
          description: "true if a TP prediction claimed this GT"
        matchedPredictionId:
          type: ["string", "null"]
        nearestPredictionId:
          type: ["string", "null"]
          description: Closest prediction even when unmatched
        nearestPredictionIou:
          description: IoU with the nearest prediction; null if no predictions exist
          oneOf:
            - type: number
              minimum: 0.0
              maximum: 1.0
            - type: "null"
        errorType:
          description: "null for matched GTs; the failure mode for unmatched ones"
          oneOf:
            - type: string
              enum:
                - false_negative
                - localization
                - classification
            - type: "null"

    # -------------------------------------------------------------------------
    # Image-level results
    # -------------------------------------------------------------------------

    ImageListItem:
      type: object
      description: >
        Lightweight image summary for list/gallery views.
        Strips predictions and groundTruths to keep payloads small.
      required:
        - id
        - runId
        - filename
        - imageUrl
        - width
        - height
        - score
        - truePositives
        - falsePositives
        - falseNegatives
        - dominantErrorType
        - classesPresent
        - tags
      properties:
        id:
          type: string
        runId:
          type: string
        filename:
          type: string
        imageUrl:
          type: string
          format: uri
        width:
          type: integer
          description: Width in pixels
        height:
          type: integer
          description: Height in pixels
        score:
          type: number
          minimum: 0.0
          maximum: 1.0
          description: "F1 score: 2TP / (2TP + FP + FN)"
        truePositives:
          type: integer
        falsePositives:
          type: integer
        falseNegatives:
          type: integer
        dominantErrorType:
          description: Highest-count error type on this image
          oneOf:
            - $ref: "#/components/schemas/ErrorType"
            - type: "null"
        classesPresent:
          type: array
          items:
            type: string
          description: Class names of GT objects present in this image
        tags:
          type: array
          items:
            type: string
          description: 'e.g. "small_objects", "crowded"'

    ImageResult:
      description: Full per-image validation result including all predictions and GTs.
      allOf:
        - $ref: "#/components/schemas/ImageListItem"
        - type: object
          required: [predictions, groundTruths]
          properties:
            predictions:
              type: array
              items:
                $ref: "#/components/schemas/Detection"
            groundTruths:
              type: array
              items:
                $ref: "#/components/schemas/GroundTruth"

    # -------------------------------------------------------------------------
    # Metrics
    # -------------------------------------------------------------------------

    AggregateMetrics:
      type: object
      required: [map50, map50_95, precision, recall, f1]
      properties:
        map50:
          type: number
          description: Mean Average Precision at IoU=0.50
        map50_95:
          type: number
          description: Mean Average Precision averaged over IoU=0.50:0.05:0.95
        precision:
          type: number
        recall:
          type: number
        f1:
          type: number

    ClassMetrics:
      type: object
      # DISCREPANCY RESOLVED: models.py has a `support` field (GT instance count)
      # that was missing from validation.ts. It is included here as authoritative.
      # After regenerating types/api.ts, update any frontend code that renders
      # per-class metrics tables to display this field.
      required:
        - classId
        - className
        - map50
        - map50_95
        - precision
        - recall
        - f1
        - support
        - truePositives
        - falsePositives
        - falseNegatives
      properties:
        classId:
          type: integer
        className:
          type: string
        map50:
          type: number
          description: Average Precision at IoU=0.50
        map50_95:
          type: number
          description: Average Precision averaged over IoU=0.50:0.05:0.95
        precision:
          type: number
        recall:
          type: number
        f1:
          type: number
        support:
          type: integer
          description: GT instance count for this class in the dataset
        truePositives:
          type: integer
        falsePositives:
          type: integer
        falseNegatives:
          type: integer

    # -------------------------------------------------------------------------
    # Validation run
    # -------------------------------------------------------------------------

    ValidationRun:
      type: object
      required:
        - id
        - modelId
        - modelName
        - datasetName
        - split
        - createdAt
        - status
        - imageCount
        - classNames
        - aggregateMetrics
        - perClassMetrics
        - confusionMatrix
      properties:
        id:
          type: string
        modelId:
          type: string
        modelName:
          type: string
        datasetName:
          type: string
        split:
          $ref: "#/components/schemas/DataSplit"
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp
        status:
          $ref: "#/components/schemas/RunStatus"
        imageCount:
          type: integer
        classNames:
          type: array
          items:
            type: string
          description: Ordered list of class names; index == classId
        aggregateMetrics:
          $ref: "#/components/schemas/AggregateMetrics"
        perClassMetrics:
          type: array
          items:
            $ref: "#/components/schemas/ClassMetrics"
        confusionMatrix:
          type: array
          items:
            type: array
            items:
              type: integer
          description: "confusionMatrix[trueClassId][predictedClassId] = count"

    # -------------------------------------------------------------------------
    # Filter parameters (used by the image list endpoint and gallery deep-links)
    # -------------------------------------------------------------------------

    ImageFilters:
      type: object
      description: Filter and sort parameters for the image list endpoint.
      required: [sort, page, pageSize]
      properties:
        class:
          type: string
        errorType:
          $ref: "#/components/schemas/ErrorType"
        dominantErrorType:
          description: >
            Strict filter - only images whose dominant error matches. Used by patterns-page.
          $ref: "#/components/schemas/ErrorType"
        confMin:
          type: number
          minimum: 0
          maximum: 1
        confMax:
          type: number
          minimum: 0
          maximum: 1
        sort:
          $ref: "#/components/schemas/SortOrder"
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1

    # -------------------------------------------------------------------------
    # Pattern analysis
    # -------------------------------------------------------------------------

    PatternGroup:
      type: object
      required:
        - label
        - count
        - avgScore
        - errorBreakdown
        - representativeImageIds
      properties:
        label:
          type: string
          description: 'e.g. "bird", "false_positive", "low (0–0.4)"'
        count:
          type: integer
          description: Number of images in this group
        avgScore:
          type: number
          description: Mean score across the group
        errorBreakdown:
          type: object
          description: Count of each ErrorType present in this group
          additionalProperties:
            type: integer
        representativeImageIds:
          type: array
          maxItems: 3
          items:
            type: string
          description: Top 3 worst images in the group
        galleryParams:
          # DISCREPANCY RESOLVED: Present in validation.ts as Partial<ImageFilters>
          # but missing from models.py. Added here so it is generated into both.
          # All properties are optional (reflects Partial<ImageFilters>).
          type: object
          description: Partial ImageFilters for deep-linking back to the gallery
          properties:
            class:
              type: string
            errorType:
              $ref: "#/components/schemas/ErrorType"
            confMin:
              type: number
              minimum: 0
              maximum: 1
            confMax:
              type: number
              minimum: 0
              maximum: 1
            sort:
              $ref: "#/components/schemas/SortOrder"
            page:
              type: integer
            pageSize:
              type: integer

    PatternsResponse:
      type: object
      required: [groupBy, groups]
      properties:
        groupBy:
          $ref: "#/components/schemas/PatternGroupBy"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/PatternGroup"
          description: Sorted by count descending

    # -------------------------------------------------------------------------
    # Response envelopes
    # -------------------------------------------------------------------------

    RunSummaryResponse:
      type: object
      required: [run]
      properties:
        run:
          $ref: "#/components/schemas/ValidationRun"

    ImageListResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ImageListItem"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ImageDetailResponse:
      type: object
      required: [image]
      properties:
        image:
          $ref: "#/components/schemas/ImageResult"
